services:
  postgres:
    image: postgres:17-alpine
    container_name: atlascrm-postgres
    environment:
      POSTGRES_DB: atlascrm
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - atlascrm_pgdata:/var/lib/postgresql/data
      - ./database/init.sql:/docker-entrypoint-initdb.d/init.sql

  api:
    build:
      context: .
      dockerfile: src/API/Dockerfile
    container_name: atlascrm-api
    environment:
      ASPNETCORE_ENVIRONMENT: Development
      ConnectionStrings__DefaultConnection: Host=postgres;Port=5432;Database=atlascrm;Username=postgres;Password=postgres
      Jwt__Issuer: AtlasCRM
      Jwt__Audience: AtlasCRM.Web
      Jwt__SecretKey: atlascrm-super-secret-key-change-me
      FrontendUrl: http://localhost:3000
    ports:
      - "8080:8080"
    depends_on:
      - postgres

  web:
    build:
      context: ./web
      dockerfile: Dockerfile
    container_name: atlascrm-web
    environment:
      NEXT_PUBLIC_API_URL: http://localhost:8080
    ports:
      - "3000:3000"
    depends_on:
      - api

volumes:
  atlascrm_pgdata:
