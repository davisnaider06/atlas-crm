services:
  api:
    build:
      context: .
      dockerfile: src/API/Dockerfile
    container_name: atlascrm-api
    environment:
      ASPNETCORE_ENVIRONMENT: Development
      ConnectionStrings__DefaultConnection: ${ATLASCRM_DB_CONNECTION}
      Database__AutoCreateSchema: ${ATLASCRM_DB_AUTO_CREATE:-false}
      Jwt__Issuer: ${ATLASCRM_JWT_ISSUER:-AtlasCRM}
      Jwt__Audience: ${ATLASCRM_JWT_AUDIENCE:-AtlasCRM.Web}
      Jwt__SecretKey: ${ATLASCRM_JWT_SECRET:-atlascrm-super-secret-key-change-me}
      FrontendUrl: ${ATLASCRM_FRONTEND_URL:-http://localhost:3000}
    ports:
      - "8080:8080"

  web:
    build:
      context: ./web
      dockerfile: Dockerfile
    container_name: atlascrm-web
    environment:
      NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-http://localhost:8080}
    ports:
      - "3000:3000"
    depends_on:
      - api
