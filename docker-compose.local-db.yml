services:
  postgres:
    image: postgres:17-alpine
    container_name: atlascrm-postgres
    environment:
      POSTGRES_DB: atlascrm
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - atlascrm_pgdata:/var/lib/postgresql/data
      - ./database/init.sql:/docker-entrypoint-initdb.d/init.sql

volumes:
  atlascrm_pgdata:
